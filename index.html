<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заметки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container" id="appCard">
    <h2>Список задач</h2>
    
    <input type="text" id="taskInput" class="input-field" placeholder="Введите текст задачи...">
    
    <button id="addBtn" class="btn btn-add">Добавить задачу</button>

    <div class="theme-box">
      <button id="darkBtn" class="btn btn-theme">Темная тема</button>
      <button id="lightBtn" class="btn btn-theme">Светлая тема</button>
    </div>

    <ul id="taskList"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
